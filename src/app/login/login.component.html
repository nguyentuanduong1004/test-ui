<div class="login-container">
  <div class="card">
    <div class="theme-toggle">
      <button pButton type="button" (click)="toggleTheme()" [icon]="darkMode ? 'pi pi-sun' : 'pi pi-moon'" class="p-button-rounded p-button-text"></button>
    </div>
    <h2>Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="p-field">
        <label for="email">Email</label>
        <input id="email" type="email" pInputText formControlName="email" [class.p-invalid]="email.invalid && (email.dirty || email.touched)" />
        <small *ngIf="email.invalid && (email.dirty || email.touched)" class="p-error">
          <span *ngIf="email.errors.required">Email is required.</span>
          <span *ngIf="email.errors.email">Invalid email format.</span>
        </small>
      </div>
      <div class="p-field">
        <label for="password">Password</label>
        <input id="password" type="password" pPassword formControlName="password" [class.p-invalid]="password.invalid && (password.dirty || password.touched)" feedback="false" />
        <small *ngIf="password.invalid && (password.dirty || password.touched)" class="p-error">
          <span *ngIf="password.errors.required">Password is required.</span>
          <span *ngIf="password.errors.minlength">Password must be at least 6 characters.</span>
        </small>
      </div>
      <button pButton type="submit" label="Login" [disabled]="loginForm.invalid" class="p-mt-2"></button>
    </form>
  </div>
</div>
