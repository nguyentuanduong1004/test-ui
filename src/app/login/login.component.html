<div class="login-page">
  <p-card class="login-card">
    <ng-template pTemplate="header">
      <div class="card-header">
        <span class="logo">
          <i class="pi pi-shield"></i>
        </span>
        <div>
          <h1>Welcome Back</h1>
          <p>Sign in to continue</p>
        </div>
      </div>
    </ng-template>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field">
        <p-floatLabel>
          <p-iconField iconPosition="left">
            <span pInputIcon class="pi pi-envelope"></span>
            <input
              pInputText
              id="email"
              type="email"
              formControlName="email"
              autocomplete="email"
              placeholder=" "
            />
          </p-iconField>
          <label for="email">Email</label>
        </p-floatLabel>
        <p-message
          *ngIf="email?.invalid && (email?.touched || submitted)"
          severity="error"
          text="Enter a valid email address"
        ></p-message>
      </div>

      <div class="form-field">
        <p-floatLabel>
          <p-iconField iconPosition="left">
            <span pInputIcon class="pi pi-lock"></span>
            <p-password
              id="password"
              formControlName="password"
              [feedback]="false"
              toggleMask="true"
              autocomplete="current-password"
            ></p-password>
          </p-iconField>
          <label for="password">Password</label>
        </p-floatLabel>
        <div class="error-messages">
          <p-message
            *ngIf="password?.errors?.['required'] && (password?.touched || submitted)"
            severity="error"
            text="Password is required"
          ></p-message>
          <p-message
            *ngIf="password?.errors?.['minlength'] && (password?.touched || submitted)"
            severity="error"
            text="Password must be at least 6 characters"
          ></p-message>
        </div>
      </div>

      <button pButton type="submit" label="Login" icon="pi pi-sign-in" class="login-button"></button>
    </form>
  </p-card>
</div>
